<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Muhammad Azhar Rasyad - Software Engineer</title>

  <link rel="shortcut icon" href="dist/img/AzharLogoFlag.png" type="image/x-icon">
  <link rel="icon" href="dist/img/AzharLogoFlag.png" type="image/x-icon">

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <style>
    body { font-family: 'Inter', sans-serif; }

    .gradient-bg {
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
    }

    .card-glass {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .link-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 14px 20px;
      border-radius: 14px;
      font-size: 0.95rem;
      font-weight: 600;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #e2e8f0;
      text-decoration: none;
      transition: all 0.2s ease;
      text-align: center;
    }

    .link-btn:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.22);
      transform: translateY(-2px);
      color: #fff;
    }

    .link-btn .icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }


    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 3px; }
  </style>
</head>

<body class="gradient-bg min-h-screen text-white flex flex-col">

  <!-- Main centered content -->
  <main class="flex-1 flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-2xl">

      <!-- Profile Card -->
      <div class="card-glass rounded-3xl p-8">

        <!-- Profile Header (centered) -->
        <div class="flex flex-col items-center text-center mb-8">
          <div class="relative mb-4">
            <div class="w-20 h-20 rounded-full bg-gradient-to-br from-blue-500 to-indigo-600 p-[3px] shadow-2xl shadow-blue-500/30">
              <img src="dist/img/AzharLogo.png" alt="Muhammad Azhar Rasyad"
                class="w-full h-full rounded-full object-cover bg-slate-800"
                onerror="this.style.display='none'; this.parentElement.innerHTML='<div style=\'width:100%;height:100%;border-radius:9999px;background:#334155;display:flex;align-items:center;justify-content:center;\'><span style=\'font-size:1.5rem;font-weight:700;color:#60a5fa;\'>AR</span></div>'">
            </div>
            <span class="absolute bottom-0.5 right-0.5 w-4 h-4 bg-green-400 border-2 border-slate-900 rounded-full"></span>
          </div>
          <h1 class="text-2xl font-extrabold mb-1 bg-gradient-to-r from-white to-blue-200 bg-clip-text text-transparent">
            Muhammad Azhar Rasyad
          </h1>
          <p class="text-slate-400 text-sm font-medium mb-1">Software Engineer · Web Developer</p>
          <p class="text-slate-500 text-xs flex items-center gap-1">
            <i class="fas fa-map-marker-alt text-blue-400"></i>
            Cilandak, Jakarta Selatan
          </p>
        </div>

        <!-- Divider -->
        <div class="w-full h-px bg-white/10 mb-8"></div>

        <!-- Radar Chart: full width -->
        <div class="flex flex-col items-center mb-8">
          <p class="text-xs text-slate-500 uppercase tracking-widest mb-4">Statistik Keahlian</p>
          <div style="width:100%; max-width:360px; aspect-ratio:1;">
            <canvas id="radarChart"></canvas>
          </div>
        </div>

        <!-- Divider -->
        <div class="w-full h-px bg-white/10 mb-6"></div>

        <!-- Portfolio Links -->
        <div class="mb-8">
          <p class="text-xs text-slate-500 uppercase tracking-widest mb-4 text-center">Eksplorasi Portfolio</p>
          <div class="grid grid-cols-2 gap-3">
            <a href="pendidikan.html" class="link-btn">
              <span class="icon bg-blue-500/20"><i class="fas fa-user-graduate text-blue-400"></i></span>
              <span class="text-sm">Pendidikan</span>
            </a>
            <a href="pelatihan.html" class="link-btn">
              <span class="icon bg-emerald-500/20"><i class="fas fa-book text-emerald-400"></i></span>
              <span class="text-sm">Pelatihan</span>
            </a>
            <a href="pengalaman.html" class="link-btn">
              <span class="icon bg-amber-500/20"><i class="fas fa-file-contract text-amber-400"></i></span>
              <span class="text-sm">Pengalaman</span>
            </a>
            <a href="proyek.html" class="link-btn">
              <span class="icon bg-indigo-500/20"><i class="fas fa-briefcase text-indigo-400"></i></span>
              <span class="text-sm">Proyek</span>
            </a>
          </div>
        </div>

        <!-- Divider -->
        <div class="w-full h-px bg-white/10 mb-6"></div>

        <!-- Links: 1 row, 3 equal columns -->
        <div>
          <p class="text-xs text-slate-500 uppercase tracking-widest mb-4 text-center">Hubungi Saya</p>
          <div class="flex gap-3">
            <a href="https://www.linkedin.com/in/mazharrasyad" target="_blank" class="link-btn flex-1 flex-col py-4 gap-2">
              <span class="icon" style="background: rgba(10,102,194,0.25); margin: 0 auto;">
                <i class="fab fa-linkedin-in" style="color: #60a5fa;"></i>
              </span>
              <span class="text-sm">LinkedIn</span>
            </a>

            <a href="https://github.com/mazharrasyad" target="_blank" class="link-btn flex-1 flex-col py-4 gap-2">
              <span class="icon" style="background: rgba(255,255,255,0.08); margin: 0 auto;">
                <i class="fab fa-github" style="color: #e2e8f0;"></i>
              </span>
              <span class="text-sm">GitHub</span>
            </a>

            <a href="http://wa.me/+6281290351971" target="_blank" class="link-btn flex-1 flex-col py-4 gap-2">
              <span class="icon" style="background: rgba(34,197,94,0.18); margin: 0 auto;">
                <i class="fab fa-whatsapp" style="color: #4ade80;"></i>
              </span>
              <span class="text-sm">WhatsApp</span>
            </a>
          </div>
        </div>

      </div>

    </div>
  </main>

  <!-- Footer -->
  <footer class="text-center py-5">
    <p class="text-slate-600 text-xs">&copy; 2026 Muhammad Azhar Rasyad</p>
  </footer>

  <script>
    const ctx = document.getElementById('radarChart').getContext('2d');

    const gradientFill = ctx.createLinearGradient(0, 0, 0, 260);
    gradientFill.addColorStop(0, 'rgba(99, 179, 255, 0.55)');
    gradientFill.addColorStop(1, 'rgba(139, 92, 246, 0.35)');

    new Chart(ctx, {
      type: 'radar',
      data: {
        labels: ['Web Dev', 'Data', 'Programming', 'Android Dev', 'UI/UX', 'Soft Skill', 'Cloud'],
        datasets: [{
          data: [37.3, 20.9, 18.2, 10.9, 6.4, 3.6, 2.7],
          fill: true,
          backgroundColor: gradientFill,
          borderColor: 'rgba(147, 197, 253, 1)',
          borderWidth: 2.5,
          pointBackgroundColor: 'rgba(147, 197, 253, 1)',
          pointBorderColor: '#1e293b',
          pointBorderWidth: 2,
          pointRadius: 5,
          pointHoverRadius: 7,
          pointHoverBackgroundColor: '#fff',
          pointHoverBorderColor: 'rgba(147, 197, 253, 1)',
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        scales: {
          r: {
            min: 0,
            max: 40,
            ticks: {
              stepSize: 10,
              color: 'rgba(148,163,184,0.7)',
              backdropColor: 'transparent',
              font: { size: 9 },
              showLabelBackdrop: false,
            },
            grid: {
              color: 'rgba(255,255,255,0.12)',
              lineWidth: 1,
            },
            angleLines: {
              color: 'rgba(255,255,255,0.15)',
              lineWidth: 1,
            },
            pointLabels: {
              color: '#cbd5e1',
              font: { size: 11, weight: '600' },
            }
          }
        },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: 'rgba(15,23,42,0.9)',
            titleColor: '#93c5fd',
            bodyColor: '#e2e8f0',
            borderColor: 'rgba(99,179,255,0.3)',
            borderWidth: 1,
            padding: 10,
            callbacks: {
              label: (item) => ` ${item.raw}%`
            }
          }
        }
      }
    });
  </script>

</body>
</html>
